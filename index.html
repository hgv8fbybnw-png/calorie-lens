<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>カロリーレンズ</title>
<meta name="theme-color" content="#16a34a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="カロリーレンズ">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #f7f8fa; color: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif; }
.wrap { max-width: 520px; margin: 0 auto; padding: 20px 16px 60px; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.title { font-size: 21px; font-weight: 700; color: #16a34a; }
.gear { width: 38px; height: 38px; border: none; background: #fff; border-radius: 12px; font-size: 19px; cursor: pointer; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
.card { background: #fff; border-radius: 18px; padding: 22px; box-shadow: 0 1px 10px rgba(0,0,0,.05); margin-bottom: 18px; }
.label { font-size: 15px; color: #555; margin-bottom: 14px; }
.modes { display: flex; gap: 8px; margin-bottom: 18px; }
.mode { flex: 1; padding: 12px 4px; border: 2px solid #e2e8f0; border-radius: 12px; text-align: center; font-size: 14px; font-weight: 700; color: #64748b; background: #fff; cursor: pointer; }
.mode.active { border-color: #16a34a; color: #16a34a; background: #f0fdf4; }
.pick { display: block; width: 100%; padding: 30px 16px; border: 2px dashed #cbd5e1; border-radius: 14px; text-align: center; color: #16a34a; font-size: 16px; font-weight: 600; cursor: pointer; background: #f9fafb; }
#file { display: none; }
.thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.thumb { position: relative; width: 72px; height: 72px; border-radius: 10px; overflow: hidden; border: 1px solid #e2e8f0; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb .x { position: absolute; top: 2px; right: 2px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,.6); color: #fff; font-size: 13px; line-height: 20px; text-align: center; cursor: pointer; }
.btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: #16a34a; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 16px; }
.btn:disabled { background: #cbd5e1; }
.btn.sub { background: #f0fdf4; color: #16a34a; border: 2px solid #bbf7d0; padding: 12px; font-size: 15px; }
.btn.add { background: #2563eb; margin-top: 12px; }
.hint { font-size: 12px; color: #999; margin-top: 12px; text-align: center; line-height: 1.6; }
.row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
.row input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; min-width: 0; }
.row input.qty { flex: 0 0 70px; }
.row select.unitsel { flex: 0 0 74px; padding: 11px 6px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; background: #fff; }
.row .del { flex: 0 0 36px; height: 40px; border: none; background: #fee2e2; color: #b91c1c; border-radius: 10px; font-size: 18px; cursor: pointer; }
.kcal-wrap { text-align: center; padding: 10px 0; }
.kcal { font-size: 46px; font-weight: 800; color: #16a34a; line-height: 1; }
.kcal-unit { font-size: 16px; color: #16a34a; font-weight: 600; }
.macros { display: flex; gap: 10px; margin: 20px 0; }
.macro { flex: 1; text-align: center; background: #f7f8fa; border-radius: 12px; padding: 12px 4px; }
.macro .v { font-size: 18px; font-weight: 700; }
.macro .n { font-size: 12px; color: #777; margin-top: 4px; }
.section { font-size: 14px; font-weight: 700; color: #444; margin: 18px 0 10px; }
.food { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #f7f8fa; border-radius: 12px; margin-top: 8px; }
.food .fn { font-size: 15px; font-weight: 600; }
.food .fa { font-size: 12px; color: #888; margin-top: 2px; }
.food .fk { font-size: 15px; font-weight: 700; color: #16a34a; white-space: nowrap; }
.badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-top: 5px; }
.badge.barcode { background: #dcfce7; color: #15803d; }
.badge.official { background: #dbeafe; color: #1d4ed8; }
.badge.label { background: #fef9c3; color: #a16207; }
.badge.estimate { background: #fee2e2; color: #b91c1c; }
.srcnote { font-size: 12px; color: #888; margin-top: 14px; text-align: center; line-height: 1.6; }
.loading { text-align: center; color: #16a34a; padding: 24px; font-weight: 600; }
.err { text-align: center; color: #dc2626; padding: 16px; font-weight: 600; line-height: 1.6; }
.spin { display: inline-block; width: 28px; height: 28px; border: 3px solid #d1fae5; border-top-color: #16a34a; border-radius: 50%; animation: r 0.8s linear infinite; margin-bottom: 10px; }
@keyframes r { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
/* 今日の摂取状況 */
.daycard { background: linear-gradient(135deg,#16a34a,#15803d); color:#fff; }
.daycard .dhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.daycard .dtitle { font-size:15px; font-weight:700; }
.daycard .ddate { font-size:12px; opacity:.85; }
.bargroup { margin-top:14px; }
.barrow { margin-top:12px; }
.barlabel { display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px; }
.barlabel .bl { font-weight:700; }
.barlabel .bv { opacity:.95; }
.bartrack { height:12px; background:rgba(255,255,255,.25); border-radius:999px; overflow:hidden; }
.barfill { height:100%; border-radius:999px; background:#fff; transition:width .4s; }
.barfill.over { background:#fca5a5; }
.diff { font-size:12px; margin-top:4px; font-weight:600; }
.diff.under { color:#dcfce7; }
.diff.over { color:#fecaca; }
.dempty { font-size:13px; opacity:.9; margin-top:8px; line-height:1.6; }
.dactions { display:flex; gap:8px; margin-top:16px; }
.dactions button { flex:1; padding:10px; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; background:rgba(255,255,255,.2); color:#fff; }
/* 設定モーダル */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:flex-end; justify-content:center; z-index:50; }
.sheet { background:#fff; width:100%; max-width:520px; border-radius:20px 20px 0 0; padding:24px 20px 30px; max-height:88vh; overflow:auto; }
.sheet h3 { margin:0 0 4px; font-size:18px; }
.sheet p.sub { margin:0 0 18px; font-size:13px; color:#777; }
.frow { margin-bottom:14px; }
.frow label { display:block; font-size:13px; color:#555; margin-bottom:6px; font-weight:600; }
.frow input { width:100%; padding:13px; border:1px solid #cbd5e1; border-radius:10px; font-size:16px; }
.frow .unit2 { font-size:12px; color:#999; font-weight:400; }
.preset { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
.preset button { padding:8px 12px; border:1px solid #cbd5e1; background:#f8fafc; border-radius:999px; font-size:12px; cursor:pointer; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>

var app = document.getElementById("app");
app.innerHTML = [
'<div class="wrap">',
'<div class="topbar"><div class="title">カロリーレンズ</div><button class="gear" id="gear" title="目標を設定">⚙️</button></div>',

// 今日の摂取状況
'<div class="card daycard" id="dayCard"></div>',

'<div class="modes">',
'<div class="mode active" data-mode="package">パッケージ商品</div>',
'<div class="mode" data-mode="eatout">外食</div>',
'<div class="mode" data-mode="home">自炊</div>',
'</div>',

'<div class="card" id="photoCard">',
'<div class="label" id="photoLabel">パッケージの写真を選んでください（複数可）</div>',
'<label class="pick" for="file" id="picklabel">写真を選ぶ</label>',
'<input type="file" id="file" accept="image/*" multiple>',
'<div class="thumbs" id="thumbs"></div>',
'<button class="btn" id="goPhoto" disabled>カロリーを計算する</button>',
'<div class="hint" id="photoHint">バーコードが写っていると、公式の栄養成分を正確に取得します。複数の写真はそれぞれ計算し、合計も表示します。</div>',
'</div>',

'<div class="card hidden" id="homeCard">',
'<div class="label">使った食材と分量を入力してください</div>',
'<div id="ingredients"></div>',
'<button class="btn sub" id="addRow">＋ 食材を追加</button>',
'<button class="btn" id="goHome" disabled>カロリーを計算する</button>',
'<div class="hint">単位は g / ml / 個 / 切れ / 枚 / 本 / 杯 などから選べます。卵1個・鮭1切れのように入力できます。グラムが最も正確です。</div>',
'</div>',

'<div id="result" class="card" style="display:none"></div>',
'</div>'
].join("");

// ---------- 状態 ----------
var mode = "package";
var images = [];
var lastItems = null; // 直近の計算結果（記録追加用）

// ---------- localStorage: 目標と記録 ----------
var TKEY = "cl_targets_v1";
var LKEY = "cl_log_v1";
var DKEY = "cl_device_id_v1";
var SKEY = "cl_sync_code_v1";
// 同期コード（複数端末で記録を共有するための合言葉）
function getSyncCode(){ try{ return localStorage.getItem(SKEY) || ""; }catch(e){ return ""; } }
function setSyncCode(code){ try{ if(code){ localStorage.setItem(SKEY, code); } else { localStorage.removeItem(SKEY); } }catch(e){} }
var _syncTimer = null;
var _syncStatus = "";
// サーバーへ保存（デバウンスして連続保存をまとめる）
function scheduleSync(){
  var code = getSyncCode();
  if(!code) return;
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(pushToServer, 800);
}
function pushToServer(){
  var code = getSyncCode();
  if(!code) return Promise.resolve();
  setSyncStatus("saving");
  return fetch("/api/data", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "save", code: code, targets: loadTargets(), log: loadLog() })
  }).then(function(r){ return r.json(); }).then(function(d){
    setSyncStatus(d && d.ok ? "saved" : "error");
  }).catch(function(){ setSyncStatus("error"); });
}
// サーバーから取得してローカルへ反映（記録はマージ、目標はサーバー優先）
function pullFromServer(){
  var code = getSyncCode();
  if(!code) return Promise.resolve(false);
  setSyncStatus("loading");
  return fetch("/api/data", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "load", code: code })
  }).then(function(r){ return r.json(); }).then(function(d){
    if(!d || d.error){ setSyncStatus("error"); return false; }
    if(d.found){
      var srvLog = d.log || {};
      var locLog = loadLog();
      var merged = mergeLogs(locLog, srvLog);
      localStorage.setItem(LKEY, JSON.stringify(merged));
      if(d.targets && (d.targets.kcal||d.targets.protein_g||d.targets.fat_g||d.targets.carbs_g)){
        localStorage.setItem(TKEY, JSON.stringify(d.targets));
      }
    }
    setSyncStatus("saved");
    return true;
  }).catch(function(){ setSyncStatus("error"); return false; });
}
// 日付ごとの記録をマージ（同一日のエントリは時刻tで重複排除）
function mergeLogs(a, b){
  var out = {};
  var days = {};
  Object.keys(a||{}).forEach(function(d){ days[d]=true; });
  Object.keys(b||{}).forEach(function(d){ days[d]=true; });
  Object.keys(days).forEach(function(d){
    var list = [].concat(a[d]||[], b[d]||[]);
    var seen = {}; var uniq = [];
    list.forEach(function(x){ var k = (x.t||"") + "|" + (x.name||"") + "|" + (x.kcal||0); if(!seen[k]){ seen[k]=true; uniq.push(x); } });
    uniq.sort(function(p,q){ return (p.t||0)-(q.t||0); });
    out[d] = uniq;
  });
  return out;
}
function setSyncStatus(s){ _syncStatus = s; var el = document.getElementById("syncStatus"); if(el){ el.textContent = syncStatusText(s); } }
function syncStatusText(s){ if(s==="saving"||s==="loading") return "同期中..."; if(s==="saved") return "✓ 同期済み"; if(s==="error") return "⚠ 同期エラー（後で自動再試行）"; return ""; }
function getDeviceId(){
  var id = "";
  try { id = localStorage.getItem(DKEY) || ""; } catch(e){}
  if(!id){
    var rnd = (Date.now().toString(36) + Math.random().toString(36).slice(2,10));
    id = "device-" + rnd;
    try { localStorage.setItem(DKEY, id); } catch(e){}
  }
  return id;
}
function uploadImageToStore(image){
  try {
    return fetch("/api/upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deviceId: getDeviceId(), image: image, mode: mode })
    }).then(function(r){ return r.json(); }).catch(function(){ return null; });
  } catch(e) { return Promise.resolve(null); }
}
function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); }
function loadTargets(){ try{ return JSON.parse(localStorage.getItem(TKEY))||{}; }catch(e){ return {}; } }
function saveTargets(t){ localStorage.setItem(TKEY, JSON.stringify(t)); scheduleSync(); }
function loadLog(){ try{ return JSON.parse(localStorage.getItem(LKEY))||{}; }catch(e){ return {}; } }
function saveLog(l){ localStorage.setItem(LKEY, JSON.stringify(l)); scheduleSync(); }
function todayEntries(){ var l=loadLog(); return l[todayStr()]||[]; }
function todayTotals(){
  var e=todayEntries(), t={kcal:0,protein_g:0,fat_g:0,carbs_g:0};
  e.forEach(function(x){ t.kcal+=num(x.kcal); t.protein_g+=num(x.protein_g); t.fat_g+=num(x.fat_g); t.carbs_g+=num(x.carbs_g); });
  return t;
}
function addToToday(items){
  var l=loadLog(), d=todayStr(); if(!l[d]) l[d]=[];
  items.forEach(function(it){ l[d].push({ name:it.name, kcal:num(it.kcal), protein_g:num(it.protein_g), fat_g:num(it.fat_g), carbs_g:num(it.carbs_g), t:Date.now() }); });
  saveLog(l);
}
function clearToday(){ var l=loadLog(); delete l[todayStr()]; saveLog(l); }

function num(n){ return Number(n)||0; }
function r1(n){ return Math.round(num(n)*10)/10; }

// ---------- 今日の摂取状況 描画 ----------
var dayCard = document.getElementById("dayCard");
function bar(labelJa, cur, target, unit){
  cur = num(cur);
  if(!target || target<=0){
    return '<div class="barrow"><div class="barlabel"><span class="bl">'+labelJa+'</span><span class="bv">'+r1(cur)+unit+' / 未設定</span></div>'
      + '<div class="bartrack"><div class="barfill" style="width:0%"></div></div></div>';
  }
  var pct = Math.min(100, Math.round(cur/target*100));
  var over = cur > target;
  var diff = r1(Math.abs(target-cur));
  var diffHtml = over
    ? '<div class="diff over">'+diff+unit+' オーバー</div>'
    : '<div class="diff under">あと '+diff+unit+'</div>';
  return '<div class="barrow"><div class="barlabel"><span class="bl">'+labelJa+'</span><span class="bv">'+r1(cur)+' / '+target+unit+'</span></div>'
    + '<div class="bartrack"><div class="barfill'+(over?' over':'')+'" style="width:'+pct+'%"></div></div>'
    + diffHtml + '</div>';
}
function renderDay(){
  var t = loadTargets();
  var tot = todayTotals();
  var hasTarget = (t.kcal||t.protein_g||t.fat_g||t.carbs_g);
  var n = todayEntries().length;
  var h = '<div class="dhead"><div class="dtitle">今日の摂取状況</div><div class="ddate">'+todayStr()+'</div></div>';
  if(!n && !hasTarget){
    h += '<div class="dempty">⚙️から1日の目標（カロリー・PFC）を設定して、計算結果を「今日の記録に追加」すると、ここに達成状況がグラフで表示されます。</div>';
    dayCard.innerHTML = h; return;
  }
  h += '<div class="bargroup">';
  h += bar('カロリー', tot.kcal, t.kcal, 'kcal');
  h += bar('タンパク質 P', tot.protein_g, t.protein_g, 'g');
  h += bar('脂質 F', tot.fat_g, t.fat_g, 'g');
  h += bar('炭水化物 C', tot.carbs_g, t.carbs_g, 'g');
  h += '</div>';
  h += '<div class="dactions">';
  h += '<button id="undoLast">最後の記録を取消</button>';
  h += '<button id="resetDay">今日をリセット</button>';
  h += '</div>';
  dayCard.innerHTML = h;
  var ul=document.getElementById("undoLast"); if(ul) ul.addEventListener("click", function(){ var l=loadLog(),d=todayStr(); if(l[d]&&l[d].length){ l[d].pop(); saveLog(l); renderDay(); } });
  var rd=document.getElementById("resetDay"); if(rd) rd.addEventListener("click", function(){ if(confirm("今日の記録をすべて消しますか？")){ clearToday(); renderDay(); } });
}

// ---------- 設定モーダル ----------
function openSettings(){
  var t = loadTargets();
  var ov = document.createElement("div");
  ov.className = "modal"; ov.id = "settingsModal";
  ov.innerHTML = [
    '<div class="sheet">',
    '<h3>1日の目標を設定</h3>',
    '<p class="sub">カロリーとPFC（タンパク質・脂質・炭水化物）の1日の目標を入力してください。空欄の項目はグラフに「未設定」と表示されます。</p>',
    '<div class="preset">',
    '<button data-p="cut">減量の目安</button>',
    '<button data-p="maint">維持の目安</button>',
    '<button data-p="bulk">増量の目安</button>',
    '</div>',
    '<div class="frow"><label>カロリー <span class="unit2">(kcal)</span></label><input type="number" id="t_kcal" inputmode="numeric" value="'+(t.kcal||"")+'"></div>',
    '<div class="frow"><label>タンパク質 P <span class="unit2">(g)</span></label><input type="number" id="t_p" inputmode="numeric" value="'+(t.protein_g||"")+'"></div>',
    '<div class="frow"><label>脂質 F <span class="unit2">(g)</span></label><input type="number" id="t_f" inputmode="numeric" value="'+(t.fat_g||"")+'"></div>',
    '<div class="frow"><label>炭水化物 C <span class="unit2">(g)</span></label><input type="number" id="t_c" inputmode="numeric" value="'+(t.carbs_g||"")+'"></div>',
    '<div style="border-top:1px solid #eee;margin:18px 0 14px;"></div>',
'<h3 style="font-size:16px;margin:0 0 4px;">端末間の同期</h3>',
'<p class="sub" style="margin-bottom:10px;">同じ同期コードを各端末で設定すると、目標と記録がすべての端末で共有され、いつ開いても反映されます。コードは好きな合言葉でOK（4文字以上の英数字）。</p>',
'<div class="frow"><label>同期コード（合言葉）</label><input type="text" id="t_sync" placeholder="例: myfood2026" autocapitalize="off" autocomplete="off" value="' + (getSyncCode()||"") + '"></div>',
'<div id="syncStatus" style="font-size:12px;color:#16a34a;min-height:16px;margin-bottom:8px;"></div>',
'<button class="btn sub" id="connectSync" style="margin-top:0;">この端末を同期コードに接続</button>',
'<button class="btn sub" id="openHistory" style="margin-top:10px;">📅 過去の記録を見る</button>',
'<div style="border-top:1px solid #eee;margin:18px 0 14px;"></div>',
'<button class="btn" id="saveTarget">保存する</button>',
    '<button class="btn sub" id="closeSettings" style="margin-top:10px;">閉じる</button>',
    '</div>'
  ].join("");
  document.body.appendChild(ov);
  ov.addEventListener("click", function(e){ if(e.target===ov) ov.remove(); });
  ov.querySelectorAll(".preset button").forEach(function(b){
    b.addEventListener("click", function(){
      var p=b.getAttribute("data-p");
      var sets={ cut:{k:1500,p:120,f:40,c:150}, maint:{k:2000,p:120,f:55,c:240}, bulk:{k:2500,p:150,f:65,c:320} };
      var s=sets[p];
      document.getElementById("t_kcal").value=s.k;
      document.getElementById("t_p").value=s.p;
      document.getElementById("t_f").value=s.f;
      document.getElementById("t_c").value=s.c;
    });
  });
  document.getElementById("saveTarget").addEventListener("click", function(){
    var nt = {
      kcal: num(document.getElementById("t_kcal").value),
      protein_g: num(document.getElementById("t_p").value),
      fat_g: num(document.getElementById("t_f").value),
      carbs_g: num(document.getElementById("t_c").value)
    };
    saveTargets(nt); ov.remove(); renderDay();
  });
  document.getElementById("closeSettings").addEventListener("click", function(){ ov.remove(); });
setSyncStatus(_syncStatus);
var csBtn = document.getElementById("connectSync");
if(csBtn) csBtn.addEventListener("click", function(){
  var code = (document.getElementById("t_sync").value||"").trim().toLowerCase().replace(/[^a-z0-9_-]/g,"");
  if(code.length < 4){ setSyncStatus("error"); alert("同期コードは4文字以上の英数字で入力してください"); return; }
  setSyncCode(code);
  csBtn.textContent = "接続中...";
  pullFromServer().then(function(){ return pushToServer(); }).then(function(){
    renderDay();
    csBtn.textContent = "✓ 接続しました（全端末で共有）";
  });
});
var ohBtn = document.getElementById("openHistory");
if(ohBtn) ohBtn.addEventListener("click", function(){ ov.remove(); openHistory(); });
}

// ---------- 写真処理（複数） ----------
function renderThumbs() {
thumbs.innerHTML = "";
images.forEach(function (im, i) {
var d = document.createElement("div");
d.className = "thumb";
d.innerHTML = '<img src="data:image/jpeg;base64,' + im + '"><div class="x" data-i="' + i + '">×</div>';

});
thumbs.querySelectorAll(".x").forEach(function (x) {
x.addEventListener("click", function () {
images.splice(parseInt(x.getAttribute("data-i"), 10), 1);
renderThumbs();
goPhoto.disabled = images.length === 0;
});
});
goPhoto.disabled = images.length === 0;
}

function fileToData(f) {
return new Promise(function (resolve, reject) {
function fromImg(src, w0, h0) {
var max = 1280, w = w0, h = h0;
if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
else if (h >= w && h > max) { w = Math.round(w * max / h); h = max; }
var canvas = document.createElement("canvas");
canvas.width = w; canvas.height = h;
var ctx = canvas.getContext("2d");
ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, w, h);
ctx.drawImage(src, 0, 0, w, h);
resolve(canvas.toDataURL("image/jpeg", 0.85).split(",")[1]);
}
(async function () {
try {
if (typeof createImageBitmap === "function") {
try { var b = await createImageBitmap(f); fromImg(b, b.width, b.height); if (b.close) b.close(); return; } catch (e) {}
}
var reader = new FileReader();
reader.onload = function () {
var img = new Image();
img.onload = function () { fromImg(img, img.naturalWidth || img.width, img.naturalHeight || img.height); };
img.onerror = function () { reject(new Error("decode")); };
img.src = reader.result;
};
reader.onerror = function () { reject(new Error("read")); };
reader.readAsDataURL(f);
} catch (e) { reject(e); }
})();
});
}

fileEl.addEventListener("change", async function () {
var files = Array.prototype.slice.call(fileEl.files || []);
if (!files.length) return;
for (var i = 0; i < files.length; i++) {
var f = files[i];
if (!/^image\//i.test(f.type) && !/\.(jpe?g|png|webp|gif|heic|heif)$/i.test(f.name || "")) continue;
try { var data = await fileToData(f); images.push(data); } catch (e) {}
}
fileEl.value = "";
renderThumbs();
});

// ---------- バーコード検出 ----------
function loadImage(src) {
return new Promise(function (resolve, reject) {
var img = new Image();
img.onload = function () { resolve(img); };
img.onerror = function () { reject(new Error("img")); };
img.src = src;
});
}
async function detectBarcode(dataUrl) {
if (!dataUrl) return null;
try {
if ("BarcodeDetector" in window) {
var detector = new window.BarcodeDetector({ formats: ["ean_13", "ean_8", "upc_a", "upc_e", "code_128"] });
var img = await loadImage(dataUrl);
var codes = await detector.detect(img);
if (codes && codes.length) {
var raw = (codes[0].rawValue || "").replace(/\D/g, "");
if (raw.length >= 8) return raw;
}
}
} catch (e) {}
try {
if (window.ZXing && window.ZXing.BrowserMultiFormatReader) {
var reader = new window.ZXing.BrowserMultiFormatReader();
var res = await reader.decodeFromImageUrl(dataUrl);
if (res && res.text) { var r2 = res.text.replace(/\D/g, ""); if (r2.length >= 8) return r2; }
}
} catch (e) {}
return null;
}

function srcBadge(source) {
if (source === "barcode") return '<span class="badge barcode">バーコード照合（確定）</span>';
if (source === "official") return '<span class="badge official">公式データ</span>';
if (source === "label") return '<span class="badge label">パッケージ印字</span>';
if (source === "recipe") return '<span class="badge official">成分表ベース</span>';
return '<span class="badge estimate">推定</span>';
}

function renderResult(items) {
lastItems = items;
var totK=0,totP=0,totF=0,totC=0, hasEstimate=false;
items.forEach(function(it){ totK+=num(it.kcal); totP+=num(it.protein_g); totF+=num(it.fat_g); totC+=num(it.carbs_g); if(it.source==="estimate")hasEstimate=true; });
var h = '<div class="kcal-wrap"><div class="kcal">' + Math.round(totK) + '</div><div class="kcal-unit">kcal（合計）</div></div>';
h += '<div class="macros">';
h += '<div class="macro"><div class="v">' + r1(totP) + 'g</div><div class="n">タンパク質</div></div>';
h += '<div class="macro"><div class="v">' + r1(totF) + 'g</div><div class="n">脂質</div></div>';
h += '<div class="macro"><div class="v">' + r1(totC) + 'g</div><div class="n">炭水化物</div></div>';
h += '</div>';
h += '<div class="section">内訳</div>';
items.forEach(function (it) {
h += '<div class="food"><div><div class="fn">' + (it.name||"") + '</div>'
+ '<div class="fa">' + (it.amount||"") + ' ・ P' + r1(it.protein_g) + ' F' + r1(it.fat_g) + ' C' + r1(it.carbs_g) + '</div>'
+ srcBadge(it.source) + '</div><div class="fk">' + Math.round(num(it.kcal)) + ' kcal</div></div>';
});
if (hasEstimate) h += '<div class="srcnote">推定値が含まれます。パッケージはバーコード、自炊は食材のグラム入力で精度が上がります。</div>';
h += '<button class="btn add" id="addToday">＋ 今日の記録に追加する</button>';
result.style.display = "block";
result.innerHTML = h;
var at = document.getElementById("addToday");
at.addEventListener("click", function(){
  if(!lastItems || !lastItems.length) return;
  addToToday(lastItems);
  at.textContent = "✓ 今日の記録に追加しました";
  at.style.background = "#15803d";
  at.disabled = true;
  renderDay();
  window.scrollTo({ top: 0, behavior: "smooth" });
});
}

// ---------- 写真モード 計算 ----------
async function analyzeImage(image, withBarcode) {
var barcode = null;
if (withBarcode) { try { barcode = await detectBarcode("data:image/jpeg;base64," + image); } catch (e) {} }
var payload = { image: image, mode: mode };
if (barcode) payload.barcode = barcode;
var res = await fetch("/api/analyze", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
var text = await res.text();
var data; try { data = JSON.parse(text); } catch (e) { throw new Error("サーバー応答エラー"); }
if (data.error) throw new Error(data.error);
return (data.items || []).map(function (it) {
return { name: it.name, amount: it.amount, source: it.source || (mode==="eatout"?"estimate":"label"),
kcal: num(it.kcal), protein_g: num(it.protein_g), fat_g: num(it.fat_g), carbs_g: num(it.carbs_g) };
});
}

try {

result.innerHTML = '<div class="loading"><div class="spin"></div><div>' + (i+1) + ' / ' + images.length + ' 枚目を解析中...</div></div>';
var items = await analyzeImage(images[i], mode === "package");
all = all.concat(items);
        try { await uploadImageToStore(images[i]); } catch (e) {}

renderResult(all);
} catch (err) {

goPhoto.disabled = false;
});

// ---------- 自炊モード（単位対応） ----------
var UNITS = ["g","ml","個","切れ","枚","本","杯","玉","パック","大さじ","小さじ"];
function addIngredientRow(name, qty, unit) {
var div = document.createElement("div");
div.className = "row";
var opts = UNITS.map(function(u){ return '<option value="'+u+'"'+((unit||"g")===u?" selected":"")+'>'+u+'</option>'; }).join("");
div.innerHTML = '<input type="text" class="ing" placeholder="食材名（例: 卵）" value="' + (name||"") + '">'
+ '<input type="number" class="qty" inputmode="decimal" placeholder="分量" value="' + (qty||"") + '">'
+ '<select class="unitsel">' + opts + '</select>'
+ '<button class="del">×</button>';
div.querySelector(".del").addEventListener("click", function () {
div.remove();
updateHomeBtn();
});
div.querySelectorAll("input").forEach(function (inp) { inp.addEventListener("input", updateHomeBtn); });
ingredients.appendChild(div);
updateHomeBtn();
}
function updateHomeBtn() {
var rows = ingredients.querySelectorAll(".row");
var ok = false;
rows.forEach(function (r) {
var n = r.querySelector(".ing").value.trim();
var q = r.querySelector(".qty").value.trim();
if (n && q) ok = true;
});
goHome.disabled = !ok;
}
addRow.addEventListener("click", function () { addIngredientRow(); });

goHome.addEventListener("click", async function () {
var rows = ingredients.querySelectorAll(".row");
var list = [];
rows.forEach(function (r) {
var n = r.querySelector(".ing").value.trim();
var q = parseFloat(r.querySelector(".qty").value);
var u = r.querySelector(".unitsel").value;
if (n && q > 0) list.push({ name: n, quantity: q, unit: u });
});
if (!list.length) return;
goHome.disabled = true;
result.style.display = "block";
result.innerHTML = '<div class="loading"><div class="spin"></div><div>成分表をもとに計算中...</div></div>';
try {
var res = await fetch("/api/analyze", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ mode: "home", ingredients: list }) });
var text = await res.text();
var data; try { data = JSON.parse(text); } catch (e) { throw new Error("サーバー応答エラー"); }
if (data.error) throw new Error(data.error);
var items = (data.items || []).map(function (it) {
return { name: it.name, amount: it.amount, source: it.source || "recipe",
kcal: num(it.kcal), protein_g: num(it.protein_g), fat_g: num(it.fat_g), carbs_g: num(it.carbs_g) };
});
if (!items.length) throw new Error("計算できませんでした。食材名を確認してください");
renderResult(items);
} catch (err) {
result.style.display = "block";
result.innerHTML = '<div class="err">' + err.message + '</div>';
}
goHome.disabled = false;
});

// ---------- 過去の記録（履歴）----------
function openHistory(){
  var log = loadLog();
  var t2 = loadTargets();
  var days = Object.keys(log).sort().reverse();
  var ov = document.createElement("div");
  ov.className = "modal"; ov.id = "historyModal";
  var rows = "";
  if(!days.length){
    rows = '<p class="sub">まだ記録がありません。計算結果を「今日の記録に追加」すると、ここに日ごとの履歴が表示されます。</p>';
  } else {
    days.forEach(function(d){
      var es = log[d]||[];
      var tk=0,tp=0,tf=0,tc=0;
      es.forEach(function(x){ tk+=num(x.kcal); tp+=num(x.protein_g); tf+=num(x.fat_g); tc+=num(x.carbs_g); });
      var goalNote = (t2 && t2.kcal) ? (" / 目標" + t2.kcal + "kcal") : "";
      var over = (t2 && t2.kcal) ? (tk > t2.kcal) : false;
      rows += '<div class="food" style="flex-direction:column;align-items:stretch;">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<div class="fn">' + d + '</div>' +
        '<div class="fk" style="color:' + (over?"#dc2626":"#16a34a") + ';">' + Math.round(tk) + ' kcal' + goalNote + '</div></div>' +
        '<div class="fa">P' + r1(tp) + ' / F' + r1(tf) + ' / C' + r1(tc) + ' ・ ' + es.length + '件</div>' +
        '</div>';
    });
  }
  ov.innerHTML = [
    '<div class="sheet">',
    '<h3>過去の記録</h3>',
    '<p class="sub">日ごとの摂取カロリーとPFCの履歴です。同期コードを設定していれば、どの端末からでも同じ履歴が見られます。</p>',
    rows,
    '<button class="btn sub" id="closeHistory" style="margin-top:16px;">閉じる</button>',
    '</div>'
  ].join("");
  document.body.appendChild(ov);
  ov.addEventListener("click", function(e){ if(e.target===ov) ov.remove(); });
  document.getElementById("closeHistory").addEventListener("click", function(){ ov.remove(); });
}

// ---------- PWA: manifest と service worker ----------
function setupPwa(){
  try {
    var manifest = {
      name: "カロリーレンズ", short_name: "カロリーレンズ",
      start_url: "/", scope: "/", display: "standalone",
      background_color: "#f7f8fa", theme_color: "#16a34a",
      icons: [
        { src: "/icon-192.png", sizes: "192x192", type: "image/png" },
        { src: "/icon-512.png", sizes: "512x512", type: "image/png" }
      ]
    };
    var blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    var url = URL.createObjectURL(blob);
    var link = document.querySelector('link[rel="manifest"]');
    if(link){ link.setAttribute("href", url); }
  } catch(e){}
  if("serviceWorker" in navigator){
    try { navigator.serviceWorker.register("/sw.js").catch(function(){}); } catch(e){}
  }
}
