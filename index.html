<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16a34a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="カロリーレンズ">
<link rel="apple-touch-icon" href="icon-192.png">
<title>カロリーレンズ</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#f3f4f6;color:#111827}
.wrap{max-width:520px;margin:0 auto;padding:16px 16px 40px}
h1{font-size:22px;color:#16a34a;margin:8px 0 16px;font-weight:800}
.row{display:flex;align-items:center;justify-content:space-between}
.gear{width:40px;height:40px;border-radius:12px;border:none;background:#fff;font-size:18px;box-shadow:0 1px 3px rgba(0,0,0,.1);cursor:pointer}
.card{background:#fff;border-radius:16px;padding:16px;margin:12px 0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.hero{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border-radius:20px;padding:20px 18px;margin:12px 0;box-shadow:0 4px 14px rgba(22,163,74,.3)}
.hero .who{font-size:13px;opacity:.9;margin-bottom:2px}
.hero .date{font-size:12px;opacity:.8;float:right}
.bignum{font-size:46px;font-weight:800;line-height:1.05;margin:6px 0 0}
.bignum small{font-size:18px;font-weight:700;opacity:.9}
.heroSub{font-size:13px;opacity:.92;margin-top:2px}
.kbar{height:8px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden;margin:14px 0 4px}
.kbar>i{display:block;height:100%;background:#fff;border-radius:99px;transition:width .4s}
.pfcRow{display:flex;gap:8px;margin-top:14px}
.pfc{flex:1;background:rgba(255,255,255,.16);border-radius:12px;padding:8px 10px}
.pfc .lab{font-size:11px;opacity:.9}
.pfc .val{font-size:15px;font-weight:700;margin-top:2px}
.pfc .rem{font-size:10px;opacity:.85}
.pfc .pb{height:5px;background:rgba(255,255,255,.3);border-radius:99px;overflow:hidden;margin-top:5px}
.pfc .pb>i{display:block;height:100%;background:#fff}
.miniActs{display:flex;gap:8px;margin-top:14px}
.miniActs button{flex:1;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:10px;padding:9px;font-size:12px;font-weight:600;cursor:pointer}
.tabs{display:flex;gap:8px;margin:14px 0}
.tabs button{flex:1;background:#fff;border:2px solid #e5e7eb;border-radius:12px;padding:12px 0;font-size:14px;font-weight:700;color:#374151;cursor:pointer}
.tabs button.on{border-color:#16a34a;color:#16a34a;background:#f0fdf4}
label.fld{display:block;font-size:13px;font-weight:600;margin:10px 0 4px;color:#374151}
input[type=text],input[type=number]{width:100%;padding:13px;border:1.5px solid #d1d5db;border-radius:12px;font-size:16px}
.drop{border:2px dashed #86efac;border-radius:14px;padding:26px;text-align:center;color:#16a34a;font-weight:700;cursor:pointer;background:#f0fdf4}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.thumbs img{width:64px;height:64px;object-fit:cover;border-radius:10px}
.btn{width:100%;padding:15px;border:none;border-radius:14px;background:#16a34a;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px}
.btn:disabled{background:#9ca3af}
.btn.ghost{background:#f0fdf4;color:#16a34a;border:1.5px solid #86efac}
.hint{font-size:12px;color:#6b7280;margin-top:10px;line-height:1.6}
.result{margin-top:14px}
.err{color:#dc2626;font-weight:600;line-height:1.6}
.ing{display:flex;gap:8px;margin-top:8px}
.ing input{flex:1}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;z-index:50;overflow:auto}
.modal.show{display:flex}
.sheet{background:#fff;border-radius:18px;max-width:520px;width:100%;padding:20px}
.sheet h2{margin:0 0 6px;font-size:18px}
.muted{font-size:13px;color:#6b7280;line-height:1.6}
.statusOk{color:#16a34a;font-size:13px;font-weight:600;margin:6px 0}
.gateInner{max-width:460px;margin:0 auto;text-align:center;padding-top:8vh}
.gateInner .logo{font-size:40px}
.gateInner h1{justify-content:center;font-size:26px}
.histDay{border-top:1px solid #eee;padding:10px 0}
.histDay .d{font-weight:700;font-size:14px}
.histDay .s{font-size:12px;color:#6b7280;margin-top:2px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #d1fae5;border-top-color:#16a34a;border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="gate" class="wrap" style="display:none">
  <div class="gateInner">
    <div class="logo">🍱</div>
    <h1 class="row" style="display:block">カロリーレンズ</h1>
    <p class="muted" style="margin-bottom:18px">あなたの名前（合言葉）を入れて「はじめる」を押すだけ。<br>次からは開いた瞬間に、あなたの記録がそのまま表示されます。</p>
    <div class="card" style="text-align:left">
      <label class="fld" for="gateName">あなたの名前 / 合言葉</label>
      <input type="text" id="gateName" placeholder="例: たろう / family2026" autocomplete="off" autocapitalize="off" spellcheck="false">
      <div id="gateStatus" class="muted" style="margin-top:8px"></div>
      <button class="btn" id="gateGo">はじめる</button>
      <p class="hint">同じ名前を別の端末でも入れれば、同じ記録が共有されます。パスワードは不要です。</p>
    </div>
  </div>
</div>

<div id="app" class="wrap" style="display:none">
  <div class="row">
    <h1>カロリーレンズ</h1>
    <button class="gear" id="gear" title="設定">⚙️</button>
  </div>

  <div class="hero" id="hero">
    <div class="row"><span class="who" id="whoLabel"></span><span class="date" id="heroDate"></span></div>
    <div class="bignum" id="remainKcal">— <small>kcal のこり</small></div>
    <div class="heroSub" id="heroSub">読み込み中…</div>
    <div class="kbar"><i id="kbarFill" style="width:0%"></i></div>
    <div class="pfcRow">
      <div class="pfc"><div class="lab">P タンパク</div><div class="val" id="pVal">—</div><div class="rem" id="pRem"></div><div class="pb"><i id="pBar" style="width:0%"></i></div></div>
      <div class="pfc"><div class="lab">F 脂質</div><div class="val" id="fVal">—</div><div class="rem" id="fRem"></div><div class="pb"><i id="fBar" style="width:0%"></i></div></div>
      <div class="pfc"><div class="lab">C 炭水化物</div><div class="val" id="cVal">—</div><div class="rem" id="cRem"></div><div class="pb"><i id="cBar" style="width:0%"></i></div></div>
    </div>
    <div class="miniActs">
      <button id="undoLast">↩ 最後を取消</button>
      <button id="openHistory">📅 過去の記録</button>
      <button id="resetDay">今日をリセット</button>
    </div>
  </div>

  <div class="tabs">
    <button id="tabPkg" class="on">パッケージ商品</button>
    <button id="tabEat">外食</button>
    <button id="tabCook">自炊</button>
  </div>

  <div class="card" id="photoCard">
    <div id="photoLabel" style="font-weight:600;margin-bottom:10px">パッケージの写真を選んでください（複数可）</div>
    <label class="drop" id="picklabel" for="file">📷 写真を選ぶ</label>
    <input type="file" id="file" accept="image/*" multiple capture="environment" style="display:none">
    <div class="thumbs" id="thumbs"></div>
    <button class="btn" id="goPhoto">カロリーを計算する</button>
    <div class="hint" id="photoHint">バーコードが写っていると、公式の栄養成分を正確に取得します。複数の写真はそれぞれ計算し、合計も表示します。</div>
    <div class="result" id="result"></div>
  </div>

  <div class="card" id="homeCard" style="display:none">
    <div style="font-weight:600;margin-bottom:6px">材料を入力してください</div>
    <div id="ingredients"></div>
    <button class="btn ghost" id="addRow">＋ 材料を追加</button>
    <button class="btn" id="goHome">カロリーを計算する</button>
    <div class="result" id="resultHome"></div>
  </div>
</div>

<div class="modal" id="settings">
  <div class="sheet">
    <h2>設定</h2>
    <p class="muted">名前（合言葉）と1日の目標を設定できます。</p>
    <label class="fld">名前 / 合言葉</label>
    <input type="text" id="t_sync" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div id="syncStatus" class="statusOk"></div>
    <button class="btn ghost" id="connectSync">この名前のデータを読み込む</button>
    <hr style="border:none;border-top:1px solid #eee;margin:18px 0">
    <h2 style="font-size:16px">1日の目標</h2>
    <div class="tabs" style="margin:8px 0">
      <button id="goalCut" style="padding:8px 0;font-size:12px">減量</button>
      <button id="goalKeep" style="padding:8px 0;font-size:12px">維持</button>
      <button id="goalGain" style="padding:8px 0;font-size:12px">増量</button>
    </div>
    <label class="fld">カロリー (kcal)</label><input type="number" id="t_kcal">
    <label class="fld">タンパク質 P (g)</label><input type="number" id="t_p">
    <label class="fld">脂質 F (g)</label><input type="number" id="t_f">
    <label class="fld">炭水化物 C (g)</label><input type="number" id="t_c">
    <button class="btn" id="saveTarget">保存する</button>
    <button class="btn ghost" id="closeSettings">閉じる</button>
  </div>
</div>

<div class="modal" id="history">
  <div class="sheet">
    <h2>📅 過去の記録</h2>
    <div id="histList"></div>
    <button class="btn ghost" id="closeHistory">閉じる</button>
  </div>
</div>

<script>
(function(){
"use strict";
var LS={dev:"cl_device_id_v1",sync:"cl_sync_code_v1",log:"cl_log_v1",tg:"cl_targets_v1"};
var $=function(id){return document.getElementById(id)};
function getJSON(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function setJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function deviceId(){var d=localStorage.getItem(LS.dev);if(!d){d="device-"+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);localStorage.setItem(LS.dev,d)}return d}
function getCode(){return (localStorage.getItem(LS.sync)||"").trim()}
function setCode(c){localStorage.setItem(LS.sync,(c||"").trim())}
function getTargets(){return getJSON(LS.tg,{kcal:2000,protein_g:120,fat_g:55,carbs_g:240})}
function setTargets(t){setJSON(LS.tg,t)}
function getLog(){return getJSON(LS.log,{})}
function setLog(l){setJSON(LS.log,l)}
function todayStr(){var d=new Date();var m=("0"+(d.getMonth()+1)).slice(-2);var day=("0"+d.getDate()).slice(-2);return d.getFullYear()+"-"+m+"-"+day}
function num(v){v=parseFloat(v);return isFinite(v)?v:0}
function r1(v){return Math.round(num(v))}
function api(action,extra){
  var body=Object.assign({action:action,code:getCode()},extra||{});
  return fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){return r.json()});
}
var saveTimer=null;
function pushToServer(){if(!getCode())return Promise.resolve();return api("save",{targets:getTargets(),log:getLog()}).catch(function(){})}
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(pushToServer,800)}
function mergeLog(server){
  var local=getLog();var out={};var days={};var k;
  for(k in local)days[k]=1;for(k in server)days[k]=1;
  for(var day in days){
    var a=(local[day]||[]),b=(server[day]||[]);var seen={};var arr=[];
    a.concat(b).forEach(function(e){var key=(e.t||"")+"|"+(e.name||"")+"|"+e.kcal;if(!seen[key]){seen[key]=1;arr.push(e)}});
    arr.sort(function(x,y){return (x.t||0)-(y.t||0)});out[day]=arr;
  }
  return out;
}
function pullFromServer(){
  if(!getCode())return Promise.resolve(false);
  return api("load",{}).then(function(j){
    if(j&&j.found){if(j.targets)setTargets(j.targets);if(j.log)setLog(mergeLog(j.log));}
    return true;
  }).catch(function(){return false});
}

function todayEntries(){return getLog()[todayStr()]||[]}
function totalsFor(arr){var t={kcal:0,protein_g:0,fat_g:0,carbs_g:0};arr.forEach(function(e){t.kcal+=num(e.kcal);t.protein_g+=num(e.protein_g);t.fat_g+=num(e.fat_g);t.carbs_g+=num(e.carbs_g)});return t}
function addToday(item){var l=getLog();var d=todayStr();if(!l[d])l[d]=[];l[d].push({name:item.name||"記録",kcal:r1(item.kcal),protein_g:r1(item.protein_g),fat_g:r1(item.fat_g),carbs_g:r1(item.carbs_g),t:Date.now()});setLog(l);scheduleSave();renderDash()}
function undoLast(){var l=getLog();var d=todayStr();if(l[d]&&l[d].length){l[d].pop();setLog(l);scheduleSave();renderDash()}}
function clearToday(){var l=getLog();l[todayStr()]=[];setLog(l);scheduleSave();renderDash()}
function pct(a,b){if(!b)return 0;return Math.max(0,Math.min(100,Math.round(a/b*100)))}
function renderDash(){
  var tg=getTargets();var tot=totalsFor(todayEntries());
  $("whoLabel").textContent=getCode()?("👤 "+getCode()):"";
  $("heroDate").textContent=todayStr();
  var remain=Math.round(num(tg.kcal)-tot.kcal);
  if(remain>=0){$("remainKcal").innerHTML=remain.toLocaleString()+" <small>kcal のこり</small>";}
  else{$("remainKcal").innerHTML=Math.abs(remain).toLocaleString()+" <small>kcal オーバー</small>";}
  $("heroSub").textContent="今日 "+Math.round(tot.kcal).toLocaleString()+" / "+Math.round(num(tg.kcal)).toLocaleString()+" kcal 摂取";
  $("kbarFill").style.width=pct(tot.kcal,tg.kcal)+"%";
  function setP(prefix,cur,goal){
    $(prefix+"Val").textContent=Math.round(cur)+" / "+Math.round(num(goal))+"g";
    var rem=Math.round(num(goal)-cur);
    $(prefix+"Rem").textContent=rem>=0?("あと"+rem+"g"):(Math.abs(rem)+"gオーバー");
    $(prefix+"Bar").style.width=pct(cur,goal)+"%";
  }
  setP("p",tot.protein_g,tg.protein_g);setP("f",tot.fat_g,tg.fat_g);setP("c",tot.carbs_g,tg.carbs_g);
}

var picked=[];
function fileToData(f){return new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(){res(fr.result)};fr.onerror=rej;fr.readAsDataURL(f)})}
function renderThumbs(){var c=$("thumbs");c.innerHTML="";picked.forEach(function(d){var im=new Image();im.src=d;c.appendChild(im)})}
function uploadImageToStore(dataUrl){try{fetch("/api/upload",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({deviceId:deviceId(),image:dataUrl})}).catch(function(){});}catch(e){}}
function callAnalyze(payload,tries){
  tries=tries||0;
  return fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
  .then(function(r){return r.json().then(function(j){return {ok:r.ok,status:r.status,j:j}})})
  .then(function(o){
    var msg=(o.j&&(o.j.error||o.j.message))||"";
    var quota=o.status===429||/quota|rate|retry in|exceeded/i.test(msg);
    if(quota&&tries<2){
      var wait=8000;var m=/retry in ([0-9.]+)s/i.exec(msg);if(m)wait=Math.min(20000,(parseFloat(m[1])+1)*1000);
      var R=(curMode==="cook")?"resultHome":"result";
      $(R).innerHTML='<div class="hint"><span class="spin"></span>混み合っています。約'+Math.ceil(wait/1000)+'秒後に自動で再試行します…</div>';
      return new Promise(function(res){setTimeout(res,wait)}).then(function(){return callAnalyze(payload,tries+1)});
    }
    if(!o.ok)throw new Error(msg||("エラー "+o.status));
    return o.j;
  });
}
var curMode="pkg";
function apiMode(m){return m==="cook"?"home":(m==="eat"?"eatout":"package");}
function foldItems(j,fallbackName){var items=(j&&j.items)||[];var s={name:"",kcal:0,protein_g:0,fat_g:0,carbs_g:0};var names=[];items.forEach(function(it){s.kcal+=num(it.kcal);s.protein_g+=num(it.protein_g);s.fat_g+=num(it.fat_g);s.carbs_g+=num(it.carbs_g);if(it.name)names.push(it.name);});s.name=names.join("・")||fallbackName||"記録";s.items=items;return s;}
function renderResultItem(j){return '<div class="card" style="margin:10px 0"><b>'+(j.name||"解析結果")+'</b><br>'+Math.round(num(j.kcal))+' kcal / P'+Math.round(num(j.protein_g))+' F'+Math.round(num(j.fat_g))+' C'+Math.round(num(j.carbs_g))+'g</div>';}
function analyzePhotos(){
  if(!picked.length){$("result").innerHTML='<div class="err">写真を選んでください</div>';return}
  $("goPhoto").disabled=true;$("result").innerHTML='<div class="hint"><span class="spin"></span>解析中…</div>';
  picked.forEach(function(d){uploadImageToStore(d)});
  var jobs=picked.map(function(d){return callAnalyze({mode:apiMode(curMode),image:d})});
  Promise.all(jobs.map(function(p){return p.then(function(r){return {ok:1,r:r}}).catch(function(e){return {ok:0,e:e}})}))
  .then(function(rs){
    var html="";var sum={kcal:0,protein_g:0,fat_g:0,carbs_g:0};var any=false;
    rs.forEach(function(x){
      if(x.ok){any=true;var fr=foldItems(x.r,"写真");html+=renderResultItem(fr);sum.kcal+=num(fr.kcal);sum.protein_g+=num(fr.protein_g);sum.fat_g+=num(fr.fat_g);sum.carbs_g+=num(fr.carbs_g);addToday(fr);}
      else{html+='<div class="err">解析に失敗しました: '+(x.e&&x.e.message||"")+'</div>';}
    });
    if(any&&rs.length>1){html='<div class="card" style="background:#f0fdf4"><b>合計</b> '+Math.round(sum.kcal)+'kcal / P'+Math.round(sum.protein_g)+' F'+Math.round(sum.fat_g)+' C'+Math.round(sum.carbs_g)+'g</div>'+html;}
    $("result").innerHTML=html;picked=[];renderThumbs();
  }).then(function(){$("goPhoto").disabled=false});
}
function addIngredientRow(name,grams){
  var wrap=$("ingredients");var div=document.createElement("div");div.className="ing";
  div.innerHTML='<input type="text" placeholder="材料名 (例: 鶏むね肉)" value="'+(name||"")+'"><input type="number" placeholder="g" style="max-width:90px" value="'+(grams||"")+'">';
  wrap.appendChild(div);
}
function analyzeHome(){
  var R="resultHome";
  var rows=[].slice.call($("ingredients").querySelectorAll(".ing"));
  var ings=rows.map(function(r){var i=r.querySelectorAll("input");return {name:i[0].value,quantity:num(i[1].value),unit:"g"}}).filter(function(x){return x.name});
  if(!ings.length){$(R).innerHTML='<div class="err">材料を入力してください</div>';return}
  $("goHome").disabled=true;$(R).innerHTML='<div class="hint"><span class="spin"></span>計算中…</div>';
  callAnalyze({mode:"home",ingredients:ings}).then(function(j){var fr=foldItems(j,"自炊");$(R).innerHTML=renderResultItem(fr);addToday(fr);})
  .catch(function(e){$(R).innerHTML='<div class="err">計算に失敗しました: '+(e.message||"")+'</div>'})
  .then(function(){$("goHome").disabled=false});
}

function fillTargetsForm(){var t=getTargets();$("t_kcal").value=t.kcal;$("t_p").value=t.protein_g;$("t_f").value=t.fat_g;$("t_c").value=t.carbs_g;$("t_sync").value=getCode();$("syncStatus").textContent=getCode()?("✓ "+getCode()+" で同期中"):"未設定";}
function openSettings(){fillTargetsForm();$("settings").classList.add("show")}
function saveTargetsFromForm(){
  setTargets({kcal:num($("t_kcal").value),protein_g:num($("t_p").value),fat_g:num($("t_f").value),carbs_g:num($("t_c").value)});
  var c=$("t_sync").value.trim();if(c)setCode(c);
  scheduleSave();renderDash();$("settings").classList.remove("show");
}
var goalPresets={cut:{kcal:1600,protein_g:130,fat_g:45,carbs_g:160},keep:{kcal:2000,protein_g:120,fat_g:55,carbs_g:240},gain:{kcal:2600,protein_g:160,fat_g:70,carbs_g:330}};
function applyGoal(k){var g=goalPresets[k];$("t_kcal").value=g.kcal;$("t_p").value=g.protein_g;$("t_f").value=g.fat_g;$("t_c").value=g.carbs_g;}
function openHistory(){
  var log=getLog();var tg=getTargets();var days=Object.keys(log).sort().reverse();var html="";
  if(!days.length)html='<p class="muted">まだ記録がありません。</p>';
  days.forEach(function(d){
    var t=totalsFor(log[d]);var n=log[d].length;
    html+='<div class="histDay"><div class="d">'+d+'</div><div class="s">'+Math.round(t.kcal)+' / '+Math.round(num(tg.kcal))+' kcal ・ P'+Math.round(t.protein_g)+' F'+Math.round(t.fat_g)+' C'+Math.round(t.carbs_g)+'g ・ '+n+'件</div></div>';
  });
  $("histList").innerHTML=html;$("history").classList.add("show");
}
function setMode(m){
  curMode=m;
  $("tabPkg").classList.toggle("on",m==="pkg");$("tabEat").classList.toggle("on",m==="eat");$("tabCook").classList.toggle("on",m==="cook");
  $("photoCard").style.display=(m==="cook")?"none":"block";$("homeCard").style.display=(m==="cook")?"block":"none";
  if(m==="pkg"){$("photoLabel").textContent="パッケージの写真を選んでください（複数可）";}
  if(m==="eat"){$("photoLabel").textContent="料理の写真を選んでください（複数可）";}
}
function showGate(){$("gate").style.display="block";$("app").style.display="none";setTimeout(function(){$("gateName").focus()},100)}
function showApp(){$("gate").style.display="none";$("app").style.display="block"}
function startWithName(){
  var c=$("gateName").value.trim();
  if(c.length<2){$("gateStatus").textContent="2文字以上で入力してください";return}
  setCode(c);$("gateStatus").innerHTML='<span class="spin"></span>あなたの記録を読み込み中…';
  pullFromServer().then(function(){renderDash();showApp()});
}
function setupPwa(){
  try{
    var manifest={name:"カロリーレンズ",short_name:"カロリーレンズ",start_url:".",display:"standalone",background_color:"#f3f4f6",theme_color:"#16a34a",icons:[{src:"icon-192.png",sizes:"192x192",type:"image/png"},{src:"icon-512.png",sizes:"512x512",type:"image/png"}]};
    var blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
    var l=document.createElement("link");l.rel="manifest";l.href=URL.createObjectURL(blob);document.head.appendChild(l);
    if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){});}
  }catch(e){}
}

function wire(){
  deviceId();
  $("gateGo").addEventListener("click",startWithName);
  $("gateName").addEventListener("keydown",function(e){if(e.key==="Enter")startWithName()});
  $("gear").addEventListener("click",openSettings);
  $("closeSettings").addEventListener("click",function(){$("settings").classList.remove("show")});
  $("saveTarget").addEventListener("click",saveTargetsFromForm);
  $("connectSync").addEventListener("click",function(){
    var c=$("t_sync").value.trim();if(c.length<2){$("syncStatus").textContent="2文字以上で入力してください";return}
    setCode(c);$("syncStatus").innerHTML='<span class="spin"></span>読み込み中…';
    pullFromServer().then(function(){fillTargetsForm();renderDash()});
  });
  $("goalCut").addEventListener("click",function(){applyGoal("cut")});
  $("goalKeep").addEventListener("click",function(){applyGoal("keep")});
  $("goalGain").addEventListener("click",function(){applyGoal("gain")});
  $("openHistory").addEventListener("click",openHistory);
  $("closeHistory").addEventListener("click",function(){$("history").classList.remove("show")});
  $("undoLast").addEventListener("click",undoLast);
  $("resetDay").addEventListener("click",function(){if(confirm("今日の記録をすべて消しますか？"))clearToday()});
  $("tabPkg").addEventListener("click",function(){setMode("pkg")});
  $("tabEat").addEventListener("click",function(){setMode("eat")});
  $("tabCook").addEventListener("click",function(){setMode("cook")});
  $("file").addEventListener("change",function(e){
    var fs=[].slice.call(e.target.files||[]);
    Promise.all(fs.map(fileToData)).then(function(ds){picked=picked.concat(ds);renderThumbs()});
  });
  $("goPhoto").addEventListener("click",analyzePhotos);
  if(!$("ingredients").children.length){addIngredientRow();addIngredientRow();}
  $("addRow").addEventListener("click",function(){addIngredientRow()});
  $("goHome").addEventListener("click",analyzeHome);
  [["settings"],["history"]].forEach(function(x){var m=$(x[0]);m.addEventListener("click",function(e){if(e.target===m)m.classList.remove("show")})});
  document.addEventListener("visibilitychange",function(){if(!document.hidden&&getCode()){pullFromServer().then(renderDash)}});
  window.addEventListener("focus",function(){if(getCode()){pullFromServer().then(renderDash)}});
}
function init(){
  wire();setupPwa();setMode("pkg");
  if(getCode()){showApp();renderDash();pullFromServer().then(function(){renderDash()});}
  else{showGate();}
}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init)}else{init()}
})();
</script>
</body>
</html>
